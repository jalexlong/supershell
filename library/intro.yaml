title: "Module 1: Reactivation"
author: "Supershell Team"
version: "1.0.0"

quests:
  - id: "reactivation"
    title: "Cold Start"
    construct: true

    chapters:
      - title: "Emergency Light"
        intro: |
          [ARK TRAINING INTERFACE]
          Status: degraded
          Operator profile: incomplete
          Archivist process: online

          Operator, listen carefully.

          You are awake inside a damaged training area aboard the Ark. The lights are low, the air is still, and your console is waiting for input.

          This place is not empty. It is only unscanned.

          In Supershell, directories are places. Files are objects, items, or things. Commands are actions.

          Your first action is `ls`.

          The `ls` command lists what is visible in your current place. Use it to scan the area.

        setup_actions:
          - type: ResetWorld
          - type: CreateDir
            path: "Memory_Bank"
          - type: CreateDir
            path: "Memory_Bank/Sector_A"
          - type: CreateFile
            path: "Memory_Bank/Sector_A/welcome_packet.txt"
            content: |
              ARK WELCOME PACKET
              ------------------

              Operator Candidate,

              If you are reading this, your console, location tracking, and file inspection systems are working.

              You are aboard the Ark: a damaged training vessel built to preserve knowledge and teach safe system operation.

              Remember the first rule:

              Observe before acting.

              Directories are places.
              Files are objects, items, or things.
              Commands are actions.

              You have taken your first steps. More of the Ark remains dark.

        tasks:
          - objective: "Scan the Training Area"
            description: "Use `ls` to scan your current place."
            instruction: "Run `ls` to list what is visible here."
            success_msg: "Scan complete. A place named `Memory_Bank` is visible."
            conditions:
              - type: CommandMatches
                pattern: '^ls(\s.*)?$'

        outro: |
          [SCAN COMPLETE]

          The emergency light steadies.

          A place named `Memory_Bank` appears in the listing. That is a directory, which means it is somewhere you can go.

          You have not opened a menu or used a fake game command. You used a real shell command to inspect your environment.

      - title: "First Passage"
        intro: |
          The Archivist signal flickers, then returns.

          The `Memory_Bank` is the next place you need to inspect. To move between places in the shell, use `cd`, which means "change directory."

          Think of `cd` as movement.

          You are currently outside the `Memory_Bank`. Move into it now.

        tasks:
          - objective: "Enter the Memory Bank"
            description: "Move into the `Memory_Bank` directory."
            instruction: "Run `cd Memory_Bank` to enter the place named `Memory_Bank`."
            success_msg: "Location changed. You are inside `Memory_Bank`."
            conditions:
              - type: CommandMatches
                pattern: '^cd\s+Memory_Bank/?\s*$'
              - type: WorkingDir
                path: "Memory_Bank$"

        outro: |
          [LOCATION UPDATED]

          You are now inside the `Memory_Bank`.

          Notice the prompt. In a real shell, your prompt often changes as you move. That is a clue. It helps you keep track of where you are.

          Movement and observation are separate actions. Entering a place does not automatically show everything inside it.

      - title: "Survey the Room"
        intro: |
          The `Memory_Bank` is quiet.

          At first glance, it may seem empty. Do not assume that. On the Ark, careful Operators scan before making decisions.

          Use `ls` again to inspect this new place.

        tasks:
          - objective: "Scan the Memory Bank"
            description: "Use `ls` to inspect the `Memory_Bank`."
            instruction: "Run `ls` to list what is visible in this place."
            success_msg: "Scan complete. A deeper place named `Sector_A` is visible."
            conditions:
              - type: CommandMatches
                pattern: '^ls(\s.*)?$'

          - objective: "Enter Sector A"
            description: "Move into `Sector_A`."
            instruction: "Run `cd Sector_A` to go deeper into the Ark."
            success_msg: "Location changed. You are inside `Sector_A`."
            conditions:
              - type: CommandMatches
                pattern: '^cd\s+Sector_A/?\s*$'
              - type: WorkingDir
                path: "Sector_A$"

        outro: |
          [LOWER DECK ACCESS]

          You found `Sector_A`.

          Places can contain other places. That is one of the most important ideas in the shell.

          The Ark is built from paths. Learning to move through those paths is the first step toward understanding the system.

      - title: "The First Object"
        intro: |
          Sector_A contains the first recovered object.

          It is not a place. You cannot enter it with `cd`.

          It is a file: `welcome_packet.txt`.

          Files are objects, items, or things. Some files contain readable text. To inspect a readable file, use `cat`.

          Read the welcome packet now.

        tasks:
          - objective: "Read the Welcome Packet"
            description: "Read `welcome_packet.txt` using `cat`."
            instruction: "Run `cat welcome_packet.txt` to read the object."
            success_msg: "Welcome packet read. Basic Ark navigation is online."
            conditions:
              - type: CommandMatches
                pattern: '^cat\s+welcome_packet\.txt\s*$'

        outro: |
          [REACTIVATION COMPLETE]

          Good work, Operator.

          You scanned a place with `ls`.
          You moved between places with `cd`.
          You inspected an object with `cat`.

          The Ark remains damaged, but your console is responding. You now know the first pattern:

          Observe where you are.
          Identify what is around you.
          Choose an action carefully.

          More systems are waiting.
