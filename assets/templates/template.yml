--- Quest Template Generator ---
This script helps you create YAML templates for your quests.
Copy the output below into a .yml file in your assets/quests/ directory.


--- Example Full Quest Template ---
id: new_quest_001
title: My First Custom Quest
description: This is an example quest to guide you through the process of creating
  a new adventure.
on_quest_start:
- action: say
  character: cypher
  message: This is a dialogue message from the character.
- action: say
  character: cypher
  message: 'Welcome to the quest: [bold]My First Custom Quest[/bold]!'
- action: advance_objective
objectives:
- id: new_quest_001_obj_1
  type: any_command
  description: Run any command to start the quest.
  hint: Just type 'ls' or 'pwd' to get started!
  criteria: {}
  on_complete_script:
  - action: advance_objective
  on_command_fail_script:
  - action: conditional_say_on_fail
    character: glitch
    message: It seems your command failed! Try something else.
    if_command: rm
    if_args_contain: -rf
- id: new_quest_001_obj_2
  type: path_exists
  description: Create a file named 'report.txt' in your home directory.
  hint: Use 'touch' to create a file.
  criteria:
    path: ~/some/directory/or/file
    type: file
  on_complete_script: []
  on_command_fail_script: []
  required_cwd: '~'
- id: new_quest_001_obj_3
  type: file_contains
  description: Add the text 'mission critical' to 'report.txt'.
  hint: You might need to use 'echo' and redirection (>) or (>>).
  criteria:
    path: ~/some/file.txt
    content: expected_text_inside_file
  on_complete_script: []
  on_command_fail_script: []
  required_cwd: '~'
on_load_sync:
- action: spawn_tracked_dir
  path: ~/data
- action: spawn_tracked_file
  path: ~/data/secret.md
  content: The password is {{secret_password}}.
- action: generate_and_save_password
on_hard_fail_script:
- action: say
  character: hunter
  message: You made a critical error. Restarting quest.
- action: reset_current_quest


