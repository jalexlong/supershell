id: "quest_04_the_cleanup"
title: "The Cleanup"
description: "Time to remove your tracks and become a true part of the system."

on_quest_start:
  - action: "say"
    character: "cypher"
    message: "Alright, Operator. Your missions are complete, but there's one last task: cleanup."
  - action: "say"
    character: "cypher"
    message: "[bold red]BIG WARNING:[/bold red] The `rm` (remove) and `rmdir` (remove directory) commands are **permanent**. There is no 'undo.' There is no 'Recycle Bin.' Be *very* careful."
  - action: "say"
    character: "cypher"
    message: "Now, let's start by cleaning up your Hideout. Remove the `b1` folder from your `Desktop`."
  - action: "advance_objective"

on_hard_fail_script:
  - action: "say"
    character: "system"
    message: "[bold red]CRITICAL FAILURE:[/bold red] You've made a mistake that requires a full quest restart."
  - action: "say"
    character: "cypher"
    message: "Whoops! Looks like that was a major screw-up. Don't worry, we'll just start this lesson over. Try to be more careful next time, okay?"
  - action: "reset_current_quest"

objectives:
  - id: "04_a_remove_hideout"
    description: "Remove your Hideout folder (`~/Desktop/b1`)."
    type: "path_not_exists"
    criteria: { path: "~/Desktop/b1" }
    hint: "Use `rm -r ~/Desktop/b1` to remove the directory and its contents."
    on_command_fail_script:
      - action: "say"
        character: "cypher"
        message: "You need to remove the entire `b1` folder from your Desktop. Remember `rm -r` for directories."
      - action: "conditional_hard_fail"
        if_command: "rm"
        if_args_contain: "-rf /"
        if_return_code: 1
      - action: "say" # General hint if conditional_hard_fail doesn't trigger
        character: "cypher"
        message: "Make sure you're targeting the `b1` directory."
    on_complete_script:
      - action: "say"
        character: "cypher"
        message: "Hideout removed. Good. Now for your Boot Camp files. Remove `~/bootcamp`."
      - action: "advance_objective"

  - id: "04_b_remove_bootcamp"
    description: "Remove your Boot Camp folder (`~/bootcamp`)."
    type: "path_not_exists"
    criteria: { path: "~/bootcamp" }
    hint: "Use `rm -r ~/bootcamp` to remove the directory and its contents."
    on_command_fail_script:
      - action: "say"
        character: "cypher"
        message: "You need to remove the `bootcamp` folder. Remember `rm -r`."
      - action: "conditional_hard_fail"
        if_command: "rm"
        if_args_contain: "-rf /"
        if_return_code: 1
      - action: "say" # General hint
        character: "cypher"
        message: "Focus on removing the `bootcamp` directory."
    on_complete_script:
      - action: "say"
        character: "cypher"
        message: "Bootcamp folder removed. One last file to erase your temporary manifest..."
      - action: "say"
        character: "cypher"
        message: "Remove `~/CORE_SIGNATURE.dat`."
      - action: "advance_objective"

  - id: "04_c_remove_core_signature"
    description: "Remove the temporary manifest file (`~/CORE_SIGNATURE.dat`)."
    type: "path_not_exists"
    criteria: { path: "~/CORE_SIGNATURE.dat" }
    hint: "Use `rm ~/CORE_SIGNATURE.dat`."
    on_command_fail_script:
      - action: "say"
        character: "cypher"
        message: "You need to remove the `CORE_SIGNATURE.dat` file. Use `rm`."
      - action: "conditional_hard_fail"
        if_command: "rm"
        if_args_contain: "-rf /"
        if_return_code: 1
      - action: "say" # General hint
        character: "cypher"
        message: "The target is `~/CORE_SIGNATURE.dat`."
    on_complete_script:
      - action: "say"
        character: "cypher"
        message: "...Manifest deleted. You're not an anomaly anymore. You're a user. Welcome to the system."
      - action: "cleanup_all_tracked_files" # This will be our new action
      - action: "advance_quest"

on_load_sync:
  # Ensure the hideout directories exist if not yet removed by the player
  - id: "02_c_mkdir_hideout" # If quest 2 hideout creation was completed
    not_completed: "04_a_remove_hideout" # And this objective is NOT completed yet
    action: "spawn_tracked_dir"
    path: "~/Desktop/b1/MyHideout"
  - id: "02_b_mkdir_b1" # If quest 2 b1 creation was completed
    not_completed: "04_a_remove_hideout" # And this objective is NOT completed yet
    action: "spawn_tracked_dir"
    path: "~/Desktop/b1"
  # Ensure bootcamp directory exists if not yet removed
  - id: "01_c_mkdir" # If quest 1 bootcamp creation was completed
    not_completed: "04_b_remove_bootcamp" # And this objective is NOT completed yet
    action: "spawn_tracked_dir"
    path: "~/bootcamp"
  # Ensure CORE_SIGNATURE.dat exists if not yet removed
  - not_completed: "04_c_remove_core_signature" # This objective is NOT completed yet
    action: "spawn_tracked_file"
    path: "~/CORE_SIGNATURE.dat"
    content: "CORE_SIGNATURE_DATA" # Provide some dummy content
