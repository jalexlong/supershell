id: "quest_02_the_hideout"
title: "The Hideout"
description: "Time to build your secret base and hide your valuable intel."

on_quest_start:
  - action: "say"
    character: "cypher"
    message: "Boot Camp is over, Operator. Time for your first *real* mission."
  - action: "say"
    character: "cypher"
    message: "We need a secure location. Go to your `Desktop`."
  - action: "advance_objective"

on_hard_fail_script:
  - action: "say"
    character: "system"
    message: "[bold red]CRITICAL FAILURE:[/bold red] You've compromised your mission. Restarting Quest 02."
  - action: "say"
    character: "cypher"
    message: "That was a major slip-up! We can't afford to be sloppy. Let's start over from the beginning of this mission."
  - action: "reset_current_quest"

objectives:
  - id: "02_a_desktop"
    description: "Navigate to your Desktop directory."
    type: "cwd_is"
    criteria: { path: "~/Desktop" }
    hint: "Use the `cd` command to change directory to your `Desktop`."
    on_command_fail_script:
      - action: "say"
        character: "cypher"
        message: "Not quite. You need to be in your `Desktop` directory to begin. Try `cd Desktop`."
    on_complete_script:
      - action: "say"
        character: "cypher"
        message: "Good. This is the 'public' area. Your first task is to blend in."
      - action: "say"
        character: "cypher"
        message: "Create a folder for your class, like `mkdir b1`."
      - action: "advance_objective"

  - id: "02_b_mkdir_b1"
    description: "Create a harmless-looking directory named 'b1'."
    type: "path_exists"
    criteria: { path: "~/Desktop/b1", type: "dir" }
    hint: "Create a directory: `mkdir b1`."
    on_command_fail_script:
      - action: "say"
        character: "cypher"
        message: "We need that `b1` folder on your Desktop. Use `mkdir b1`."
    on_complete_script:
      - action: "track_dir"
        path: "~/Desktop/b1"
      - action: "say"
        character: "cypher"
        message: "Perfect. Now for the fun part. Inside `b1`, create your actual hideout: `mkdir MyHideout`."
      - action: "advance_objective"

  - id: "02_c_mkdir_hideout"
    description: "Create your secret hideout directory named 'MyHideout'."
    type: "path_exists"
    criteria: { path: "~/Desktop/b1/MyHideout", type: "dir" }
    hint: "Create your hideout: `mkdir MyHideout`."
    on_command_fail_script:
      - action: "say"
        character: "cypher"
        message: "Make sure `MyHideout` is inside `b1`. Try `mkdir b1/MyHideout` or `cd b1` first."
    on_complete_script:
      - action: "track_dir"
        path: "~/Desktop/b1/MyHideout"
      - action: "say"
        character: "cypher"
        message: "Excellent. Now, **build your base.** Use `mkdir` to make floors. Use `touch` or `nano` to make rooms. Be creative!"
      - action: "say"
        character: "cypher"
        message: "When you're done constructing your hideout, type the game command `ready`."
      - action: "advance_objective"

  - id: "02_d_manual_complete_ready"
    description: "Build your hideout and then report 'ready'."
    type: "manual_complete"
    criteria: {}
    hint: "After building your hideout, type `ready` to proceed."
    on_command_fail_script:
      - action: "say"
        character: "cypher"
        message: "You can build your base with `mkdir` for folders and `touch` for files. When you're satisfied, type `ready`."
    on_complete_script:
      - action: "generate_and_save_password"
      - action: "say"
        character: "cypher"
        message: "Nice hideout, Operator! Okay, here's your secret: [bold]{{secret_password}}[/bold]."
      - action: "say"
        character: "cypher"
        message: "Hide this *exact* string inside any of your room files within `~/Desktop/b1/MyHideout`."
      - action: "advance_objective"

  - id: "02_e_file_contains_password"
    description: "Hide the secret password within your hideout."
    type: "file_contains"
    criteria: { path: "~/Desktop/b1/MyHideout", content_from_save: "secret_password" }
    hint: "Use `echo \"{{secret_password}}\" >> path/to/your/file.txt` to hide it."
    on_command_fail_script:
      - action: "say"
        character: "cypher"
        message: "The password isn't hidden correctly. Make sure the *exact* string [bold]{{secret_password}}[/bold] is inside one of your files in `~/Desktop/b1/MyHideout`."
    on_complete_script:
      - action: "say"
        character: "cypher"
        message: "Well hidden, Operator! My scans can barely see it. Excellent work. Quest complete."
      - action: "advance_quest"

on_load_sync:
  - action: "spawn_tracked_dir"
    path: "~/Desktop"
  - action: "spawn_tracked_dir"
    path: "~/Desktop/b1"
  - action: "spawn_tracked_dir"
    path: "~/Desktop/b1/MyHideout"
